---
name: Rerun failed run

description: |
  Retrigger a GitHub Actions workflow run that has failed with a specific error message.
  This action can optionally check for specific error messages in the logs of failed jobs before retrying.
  If no error messages are provided, the workflow will retry directly without checking the logs.
  This allows for flexibility in handling workflow failures, whether you need to check for specific errors or simply want to retry the workflow immediately.

inputs:
  run-id:
    description: The id of the workflow run to re-trigger
    required: true
  repository:
    description: The name of the repository to which the workflow run belongs
    required: true
  error-messages:
    description: |
      The error messages to check for in the workflow run logs.
      The workflow will be rerun only if at least one of the given messages is found in the logs of a failed job.
      If not provided, the workflow will retry directly without checking the logs.
    default: ''
  vault-addr:
    description: The Vault URL for fetching secrets
    required: true
  vault-auth-method:
    description: The method to use to authenticate with Vault (`approle` or `jwt`)
    required: false
    default: approle
  vault-role-id:
    description: The Vault role ID for fetching secrets (required when `vault-auth-method` is `approle`)
    required: false
    default: ""
  vault-secret-id:
    description: The Vault secret ID for fetching secrets (required when `vault-auth-method` is `approle`)
    required: false
    default: ""
  vault-jwt-path:
    description: The auth backend path for (Vault) JWT authentication (required when `vault-auth-method` is `jwt`)
    required: false
    default: ""
  vault-jwt-role:
    description: The role for (Vault) JWT authentication (required when `vault-auth-method` is `jwt`)
    required: false
    default: ""
  vault-jwt-audience:
    description: The GitHub OIDC audience for (Vault) JWT authentication (required when `vault-auth-method` is `jwt`)
    required: false
    default: ""
  notify-back-on-error:
    description: |
      When the error message does not match the expected one,
      re-trigger the workflow with the parameter `notify_back_error_message`.
      Your calling workflow must implement the `notify_back_error_message` parameter
      and forward the error.
      This allows you to capture failures that are not related to a specific error.
    default: "false"
  rerun-whole-workflow:
    description: |
      If set to true, the workflow will be re-triggered in its entirety.
      This is useful when you want to retry the entire workflow instead of
      just failed jobs.
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate Vault authentication inputs
      shell: bash
      env:
        VAULT_AUTH_METHOD: ${{ inputs.vault-auth-method }}
        VAULT_ROLE_ID: ${{ inputs.vault-role-id }}
        VAULT_SECRET_ID: ${{ inputs.vault-secret-id }}
        VAULT_JWT_PATH: ${{ inputs.vault-jwt-path }}
        VAULT_JWT_ROLE: ${{ inputs.vault-jwt-role }}
        VAULT_JWT_AUDIENCE: ${{ inputs.vault-jwt-audience }}
      run: |
        missing=()
        conflicting=()
        case "${VAULT_AUTH_METHOD}" in
          approle)
            [[ -z "${VAULT_ROLE_ID}" ]] && missing+=("vault-role-id")
            [[ -z "${VAULT_SECRET_ID}" ]] && missing+=("vault-secret-id")
            [[ -n "${VAULT_JWT_PATH}" ]] && conflicting+=("vault-jwt-path")
            [[ -n "${VAULT_JWT_ROLE}" ]] && conflicting+=("vault-jwt-role")
            [[ -n "${VAULT_JWT_AUDIENCE}" ]] && conflicting+=("vault-jwt-audience")
            ;;
          jwt)
            [[ -z "${VAULT_JWT_PATH}" ]] && missing+=("vault-jwt-path")
            [[ -z "${VAULT_JWT_ROLE}" ]] && missing+=("vault-jwt-role")
            [[ -z "${VAULT_JWT_AUDIENCE}" ]] && missing+=("vault-jwt-audience")
            [[ -n "${VAULT_ROLE_ID}" ]] && conflicting+=("vault-role-id")
            [[ -n "${VAULT_SECRET_ID}" ]] && conflicting+=("vault-secret-id")
            ;;
          *)
            echo "::error::Unsupported vault-auth-method '${VAULT_AUTH_METHOD}' (expected 'approle' or 'jwt')"
            exit 1
            ;;
        esac
        if [[ ${#missing[@]} -gt 0 ]]; then
          echo "::error::Missing required input(s) for vault-auth-method='${VAULT_AUTH_METHOD}': ${missing[*]}"
          exit 1
        fi
        if [[ ${#conflicting[@]} -gt 0 ]]; then
          echo "::error::Conflicting input(s) for vault-auth-method='${VAULT_AUTH_METHOD}': ${conflicting[*]} must not be set (provide only the inputs for the selected auth method)"
          exit 1
        fi

    - name: Import Secrets
      id: vault-secrets
      uses: hashicorp/vault-action@v4.0.0
      with:
        url: ${{ inputs.vault-addr }}
        method: ${{ inputs.vault-auth-method }}
        roleId: ${{ inputs.vault-role-id }}
        secretId: ${{ inputs.vault-secret-id }}
        path: ${{ inputs.vault-jwt-path }}
        role: ${{ inputs.vault-jwt-role }}
        jwtGithubAudience: ${{ inputs.vault-jwt-audience }}
        secrets: |
          secret/data/products/infra/ci/retrigger-gha-workflow RETRIGGER_APP_ID;
          secret/data/products/infra/ci/retrigger-gha-workflow RETRIGGER_APP_KEY;

    - name: Generate a GitHub token for infra-rerun camunda/infra-global-github-actions
      id: github-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ steps.vault-secrets.outputs.RETRIGGER_APP_ID }}
        private-key: ${{ steps.vault-secrets.outputs.RETRIGGER_APP_KEY }}
        owner: camunda
        repositories: infra-global-github-actions

    - name: Get repository name and owner
      id: repository
      env:
        REPOSITORY: ${{ inputs.repository }}
      run: |
        echo "owner=${REPOSITORY%/*}" | tee -a "$GITHUB_OUTPUT"
        echo "name=${REPOSITORY##*/}" | tee -a "$GITHUB_OUTPUT"
      shell: bash

    - name: Convert error messages list to JSON
      id: error-messages
      env:
        ERROR_MESSAGES: ${{ inputs.error-messages }}
      run: |
        messages_json=$(
          echo "${ERROR_MESSAGES}" | \
            jq -c -n -R '[inputs | select(length > 0)]' | \
            jq -R .
        )
        echo json="${messages_json}" | tee -a $GITHUB_OUTPUT
      shell: bash

    - name: Trigger retry-worfklow-run.yml
      uses: codex-/return-dispatch@v3
      id: dispatch
      with:
        owner: camunda
        repo: infra-global-github-actions
        ref: main
        workflow: retry-worfklow-run.yml
        token: ${{ steps.github-token.outputs.token }}
        workflow_inputs: |
          {
            "error-messages": ${{ steps.error-messages.outputs.json }},
            "notify-back-git-ref": "${{ github.head_ref || github.ref_name }}",
            "notify-back-on-error": "${{ inputs.notify-back-on-error }}",
            "owner": "${{ steps.repository.outputs.owner }}",
            "repository": "${{ steps.repository.outputs.name }}",
            "run-id": "${{ inputs.run-id }}",
            "attempt": "${{ github.run_attempt }}",
            "rerun-whole-workflow": "${{ inputs.rerun-whole-workflow }}"
          }
        workflow_timeout_seconds: 120

    - name: Get URL of the new worfklow run dispatched, run-id=${{ steps.dispatch.outputs.run_id }}
      if: steps.dispatch.outputs.run_id != ''
      env:
        RUN_URL: ${{ steps.dispatch.outputs.run_url }}
      run: |
        echo "::warning::If specified errors are detected, failed jobs will be retried by ${RUN_URL}"
      shell: bash
