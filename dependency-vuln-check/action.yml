---
name: Dependency Vulnerability Check

# owner: @camunda/monorepo-devops-team

description: |
  Checks PR dependency changes for known vulnerabilities using the GitHub Dependency Review API.
  Blocks fixable vulnerabilities at/above fail-on-fixable-severity, and unfixable ones at/above
  fail-on-severity. Only dependencies in fail-on-scopes are gated. Vetted exceptions are
  configured via allow-ghsas in the config file.

inputs:
  base-sha:
    description: Base commit SHA of the pull request
    required: true
  head-sha:
    description: Head commit SHA of the pull request
    required: true
  base-ref:
    description: >
      Base branch of the pull request (e.g. main, stable/8.8). Used to find the
      nearest snapshotted ancestor of base-sha on the correct branch.
    required: true
  snapshot-workflow:
    description: >
      Filename of the workflow that submits the base Maven dependency snapshot
      (e.g. maven-dependency-snapshot.yml). Its successful push-event runs are
      scanned to resolve the effective base.
    required: true
  max-snapshot-lookback:
    description: >
      How many recent successful snapshot-workflow runs to scan when resolving the
      effective base. The nearest ancestor is normally near the top; raise this only
      if a very old base must be resolved.
    required: false
    default: "30"
  override-label:
    description: >
      PR label that bypasses the gate ONLY when it cannot verify the PR (GitHub
      outage after retries, or no snapshotted ancestor). Never bypasses a real
      finding. Read live from the PR, so adding it and re-running takes effect.
    required: false
    default: ci:vuln-gate-override
  config-file:
    description: Path to the vulnerability gate config file containing the allow-ghsas list
    required: false
    default: .github/dependency-review-config.json
  fail-on-severity:
    description: >
      Minimum severity (low|moderate|high|critical) that blocks when NO fix is available.
      Defaults to high (block only high/critical unfixable vulnerabilities).
    required: false
    default: high
  fail-on-fixable-severity:
    description: >
      Minimum severity (low|moderate|high|critical) that blocks when a fix IS available.
      Defaults to low (block any fixable vulnerability).
    required: false
    default: low
  fail-on-scopes:
    description: >
      Comma-separated dependency scopes to gate (runtime|development). Defaults to runtime, so
      development/test-only dependencies are reported but never block.
    required: false
    default: runtime

runs:
  using: composite
  steps:
    - name: Check for vulnerable dependencies
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        BASE_SHA: ${{ inputs.base-sha }}
        HEAD_SHA: ${{ inputs.head-sha }}
        BASE_REF: ${{ inputs.base-ref }}
        SNAPSHOT_WORKFLOW: ${{ inputs.snapshot-workflow }}
        MAX_SNAPSHOT_LOOKBACK: ${{ inputs.max-snapshot-lookback }}
        OVERRIDE_LABEL: ${{ inputs.override-label }}
        CONFIG_FILE: ${{ inputs.config-file }}
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        FAIL_ON_FIXABLE_SEVERITY: ${{ inputs.fail-on-fixable-severity }}
        FAIL_ON_SCOPES: ${{ inputs.fail-on-scopes }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
      run: python3 "${{ github.action_path }}/check.py"
