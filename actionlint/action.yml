---
name: Action lint

description: Linting for GitHub workflows

inputs:
  version:
    description: Actionlint version
    default: "1.7.3"
  ignore:
    description: Multiline; Ignore errors by messaging using regular expression.
  format:
    description: Format error messages using Go template
  custom-config-file:
    description: Actionlint custom configuration file within original repo

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - run: echo "::add-matcher::${{ github.action_path }}/actionlint-matcher.json"
      shell: bash

    - name: Download actionlint
      id: get_actionlint
      env:
        ACTIONLINT_VERSION: ${{ inputs.version }}
      run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) $ACTIONLINT_VERSION
      shell: bash

    - name: Check workflow files
      env:
        FORMAT: ${{ inputs.format }}
        IGNORE_MESSAGES: ${{ inputs.ignore }}
        CUSTOM_CONFIG_FILE: ${{inputs.custom-config-file}}
        DEFAULT_CONFIG_FILE: ${{ github.action_path }}/actionlint.yaml
      run: |
        config_file="$DEFAULT_CONFIG_FILE"
        # Verify custom_runners contains only supported labels
        if [[ -n "$CUSTOM_CONFIG_FILE" ]]; then
          # echo "Testing custom config supported labels" 
          # supported_runners=$(yq -r '.self-hosted-runner.labels' "$DEFAULT_CONFIG_FILE" | sort -u)
          # custom_runners=$(yq -r '.self-hosted-runner.labels' "$CUSTOM_CONFIG_FILE" | sort -u)
          # valid_runners=$(comm -12 <(supported_runners) <(custom_runners)) # extract valid labels from custom_runners
          # unsupported_runners=$(comm -13 <(supported_runners) <(custom_runners)) # extract invalid labels from custom_runners
          # sanitized_custom_config_file=/tmp/sanitized_custom_config_file.yaml
          # if [[ -n "$unsupported_runners" ]]; then
          #   # TODO: possible improvement would be to keep only valid_runners from the one provided by the config
          #   echo "These self-hosted labels are not supported and will be removed from actionlint configuration"
          #   echo "$unsupported_runners"
          # fi
          # yq -i '.self-hosted-runner.labels = env(valid_runners)' "$CUSTOM_CONFIG_FILE" > "$sanitized_custom_config_file"

          SANITIZED_CONFIG_FILE=/tmp/sanitized_custom_config_file.yaml
          ERROR_OUTPUTS=/tmp/actionlint-santize-error.log
          ${{ github.action_path }}/sanitize-config.sh "$CUSTOM_CONFIG_FILE" "$DEFAULT_CONFIG_FILE" "$ERROR_OUTPUTS" > "$SANITIZED_CONFIG_FILE"
          echo ::set-output name=actionlint-invalid-labels::`cat $ERROR_OUTPUTS`
          config_file="$SANITIZED_CONFIG_FILE"
        fi

        # Combine all args into an array for running purposes and readability purposes
        _args=()
        _args+=(-color)

        # Set config file
        _args+=(-config-file "$config_file")

        # Exclude shellcheck and pyflakes
        _args+=(-shellcheck)
        _args+=(-pyflakes)

        # Ignore error messages
        if [[ -n "$IGNORE_MESSAGES" ]]; then
          while read -r line
          do
            _args+=(-ignore "$line")
          done < <($IGNORE_MESSAGES)
        fi

        # Set format for error messages
        if [[ -n "$FORMAT" ]]; then
          _args+=(-format "$FORMAT")
        fi

        echo "Running actionlint with these options:"
        echo "${_args[@]}"

        # Execute actionlint
        ${{ steps.get_actionlint.outputs.executable }} "${_args[@]}"

      shell: bash
