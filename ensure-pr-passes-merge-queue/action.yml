# Monitors a PR's merge queue lifecycle: waits for the PR to be merged,
# handles evictions by re-enabling auto-merge, and detects failures.
# owner: @camunda/monorepo-devops-team
name: Ensure PR passes merge queue
description: >
  Polls the merge queue status for a PR until it is merged, closed, evicted
  too many times, or the timeout expires.

inputs:
  pr-number:
    description: 'The pull request number to monitor'
    required: true
  app-token:
    description: >
      Pre-minted GitHub App installation token used for GraphQL queries and re-enabling
      auto-merge. Installation tokens expire after 1 hour, so prefer app-id + private-key
      for timeouts beyond ~50 minutes.
    required: false
    default: ''
  app-id:
    description: 'GitHub App ID; with private-key, the action mints and refreshes installation tokens itself'
    required: false
    default: ''
  private-key:
    description: 'GitHub App private key (PEM); with app-id, the action mints and refreshes installation tokens itself'
    required: false
    default: ''
  repository-owner:
    description: 'Repository owner (e.g. camunda)'
    required: true
  repository-name:
    description: 'Repository name (e.g. camunda)'
    required: true
  timeout-minutes:
    description: 'Maximum time to wait for the merge (in minutes)'
    required: false
    default: '180'
  max-evictions:
    description: 'Maximum number of merge queue evictions before giving up'
    required: false
    default: '3'
  merge-method:
    description: 'Merge method used when re-enabling auto-merge: squash, merge, rebase, or default (omit method flag)'
    required: false
    default: 'squash'
  dry-run:
    description: 'If true, only observe without re-enabling auto-merge on eviction'
    required: false
    default: 'false'

outputs:
  result:
    description: >
      The outcome: "merged", "closed", "evicted", "timeout", or "api_failure".
      Empty when input validation fails before monitoring starts.
    value: ${{ steps.monitor.outputs.result }}
  queue-state:
    description: 'Last observed merge queue entry state (e.g. AWAITING_CHECKS, MERGEABLE, NOT_IN_QUEUE, UNKNOWN)'
    value: ${{ steps.monitor.outputs.queue-state }}
  queue-position:
    description: 'Last observed merge queue position, or N/A'
    value: ${{ steps.monitor.outputs.queue-position }}
  merge-state-status:
    description: 'Last observed PR mergeStateStatus (e.g. CLEAN, BLOCKED, UNKNOWN)'
    value: ${{ steps.monitor.outputs.merge-state-status }}

runs:
  using: composite
  steps:
    - name: Ensure PR passes merge queue
      id: monitor
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token }}
        GH_APP_ID: ${{ inputs.app-id }}
        GH_APP_PRIVATE_KEY: ${{ inputs.private-key }}
        PR_NUMBER: ${{ inputs.pr-number }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        MAX_EVICTIONS: ${{ inputs.max-evictions }}
        MERGE_METHOD: ${{ inputs.merge-method }}
        DRY_RUN: ${{ inputs.dry-run }}
        REPO_OWNER: ${{ inputs.repository-owner }}
        REPO_NAME: ${{ inputs.repository-name }}
      run: |
        bash "$GITHUB_ACTION_PATH/monitor-merge-queue.sh"
