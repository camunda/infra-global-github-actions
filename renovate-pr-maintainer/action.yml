---
name: Renovate PR maintainer
description: >
  Keeps open Renovate PRs fresh and unstuck on repositories that use
  `rebaseWhen: "conflicted"`, without the per-push rebase storm of the default
  Renovate behavior. On a schedule it inspects in-scope Renovate PRs and either
  requests a one-off Renovate rebase (via the rebase label) for stale PRs, or
  re-runs failed jobs (within a budget) for PRs whose required checks are red.

inputs:
  github-token:
    description: >
      Token used for all API calls. Needs `pull-requests: write` (apply the
      rebase label; labeling a PR via the Issues Labels API is authorized by the
      PR scope, not `issues`; the PR scope also covers the GraphQL `reviewDecision`
      read used to surface review blockers), `actions: write` (re-run failed jobs),
      and `checks: read` + `contents: read` (read PR/commit/compare state).
    required: true
  repository:
    description: "Target repository (owner/name)."
    required: false
    default: ${{ github.repository }}
  exclude-labels:
    description: >
      Comma-separated labels that take a PR out of scope. `keep-updated` is
      excluded because Renovate already keeps those continuously rebased.
    required: false
    default: "keep-updated,stop-updating"
  behind-threshold:
    description: "Rebase when the PR is at least this many commits behind base (B)."
    required: false
    default: "60"
  stale-hours:
    description: "Rebase a behind PR when its head is at least this many hours old (C); a PR level with base is never rebased on age alone."
    required: false
    default: "24"
  rerun-budget:
    description: >
      Max workflow-run attempts per head SHA before reruns stop (N). 0 (the
      default) disables reruns entirely; set to 1+ to re-run failed required
      jobs within that per-SHA budget.
    required: false
    default: "0"
  batch-size:
    description: "Max number of PRs acted on per run (blast-radius cap)."
    required: false
    default: "10"
  base-branch:
    description: "Optional exact base-branch filter; empty means all base branches."
    required: false
    default: ""
  extra-trusted-logins:
    description: >
      Comma- or newline-separated extra GitHub logins (author or committer) to
      treat as Renovate-owned when detecting human-edited branches. Renovate's
      own author and GitHub's signing committer (web-flow) are always trusted;
      add logins here when trusted automation pushes follow-up commits to
      Renovate branches under another identity (e.g. github-actions[bot]), so
      those PRs are not skipped as edited.
    required: false
    default: ""
  extra-rerun-checks:
    description: >
      Comma- or newline-separated check-run names to also treat as required when
      deciding whether to rerun a failing PR, unioned with the contexts
      discovered from rulesets. Use this to retry a check that is not a required
      status check (e.g. a flaky job) or one enforced via classic branch
      protection, which this action does not read. These are check-run names (the
      job/context), not workflow names.
    required: false
    default: ""
  require-up-to-date-strategy:
    description: >
      How to handle the `behind` mergeable_state ("Require branches to be up to
      date before merging"). One of:
      `none` (default) — the signal is ignored; a behind PR is decided purely by
      staleness, like any other PR.
      `automerge` — every behind auto-merging PR is rebased immediately so Renovate
      can merge it on its next scan (non-automerge PRs are still decided by
      staleness). Use on a base that requires up-to-date branches where Renovate
      auto-merges.
      `automerge-optimized` — minimal-churn variant of `automerge`: per base branch,
      rebase only the single least-behind *mergeable* behind auto-merging PR, and
      only when that base has no auto-merging PR already merge-ready or being
      rebased. Behind auto-merging PRs that are themselves blocked (failing/pending
      required check, awaiting review, changes requested) are excluded from priming
      so they can't stall the train — they still rebase on the staleness cadence.
      Best for busy repos where Renovate merges only a couple of PRs per run.
      `all` — every behind PR is treated as a hard merge blocker and rebased
      immediately.
    required: false
    default: "none"
  automerge-labels:
    description: >
      Comma- or newline-separated PR labels marking a Renovate PR as auto-merging,
      used by `require-up-to-date-strategy: automerge` and `automerge-optimized` to
      choose which PRs to rebase. GitHub native auto-merge (the PR's `auto_merge`) is
      always detected too, so set this empty to rely on native auto-merge only.
      Defaults to `automerge`, the label Camunda's shared Renovate preset adds to
      auto-merging PRs.
    required: false
    default: "automerge"
  dry-run:
    description: "When true, classify and log only; never modify any PR."
    required: false
    default: "false"

outputs:
  processed-prs:
    description: >
      JSON array describing every in-scope Renovate PR the run processed, each
      `{number, base, state, action, behind_by, age_hours, blockers, automerge}`
      (the same per-PR facts as the step summary). `behind_by` is `null` only when
      not measured (an indeterminate `unknown` mergeable_state, deferred to the next
      run). Empty array (`[]`) when there are none.
    value: ${{ steps.classify.outputs.processed-prs }}

runs:
  using: composite
  steps:
    - name: Classify in-scope Renovate PRs (read-only)
      id: classify
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPOSITORY: ${{ inputs.repository }}
        RENOVATE_AUTHOR: "renovate[bot]"
        EXCLUDE_LABELS: ${{ inputs.exclude-labels }}
        BEHIND_THRESHOLD: ${{ inputs.behind-threshold }}
        STALE_HOURS: ${{ inputs.stale-hours }}
        RERUN_BUDGET: ${{ inputs.rerun-budget }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        REQUIRE_UP_TO_DATE_STRATEGY: ${{ inputs.require-up-to-date-strategy }}
        AUTOMERGE_LABELS: ${{ inputs.automerge-labels }}
        EXTRA_TRUSTED_LOGINS: ${{ inputs.extra-trusted-logins }}
        EXTRA_RERUN_CHECKS: ${{ inputs.extra-rerun-checks }}
        REBASE_LABEL: "rebase"
        PLAN_FILE: ${{ runner.temp }}/renovate-pr-maintainer-plan.json
      run: bash "$GITHUB_ACTION_PATH/classify.sh"

    - name: Apply maintenance plan
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPOSITORY: ${{ inputs.repository }}
        BATCH_SIZE: ${{ inputs.batch-size }}
        DRY_RUN: ${{ inputs.dry-run }}
        REBASE_LABEL: "rebase"
        PLAN_FILE: ${{ runner.temp }}/renovate-pr-maintainer-plan.json
        # Surfaced in the step-summary footnote (recap of thresholds/logic).
        BEHIND_THRESHOLD: ${{ inputs.behind-threshold }}
        STALE_HOURS: ${{ inputs.stale-hours }}
        RERUN_BUDGET: ${{ inputs.rerun-budget }}
      run: bash "$GITHUB_ACTION_PATH/apply.sh"
